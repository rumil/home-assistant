blueprint:
  name: Two-way synchronization Grenton - Light
  description: >
    Keeps the Grenton virtual switch in full synchronization with any light entity
    (loop and restart resistant). By default the light entity is the source of truth
    on restarts and power outages. Normal user actions from either side are synced
    bidirectionally. Optionally restores saved brightness and colour temperature on
    power outage recovery.
  domain: automation
  input:
    grenton_switch:
      name: Grenton Virtual Switch
      description: Choose the Grenton switch entity.
      selector:
        entity:
          domain: switch
    target_light:
      name: Target Light
      description: Choose the light entity, e.g., from a Shelly module.
      selector:
        entity:
          domain: light
    post_outage_behavior:
      name: Post-outage behavior
      description: >
        What to do when the light recovers from an unavailable state (power outage).
        "Light as source of truth" preserves the original backward-compatible behavior.
      default: light_source_of_truth
      selector:
        select:
          options:
            - label: "Light as source of truth (default)"
              value: light_source_of_truth
            - label: "Restore previous state (brightness & colour temperature)"
              value: restore_previous
            - label: "Always turn on"
              value: turn_on
            - label: "Always turn off"
              value: turn_off
    recovery_brightness_threshold:
      name: Recovery brightness threshold (0 = disabled)
      description: >
        Only relevant when "Restore previous state" is selected. If the light turns
        on from off with a brightness at or below this value (0–255 scale), it is
        treated as a firmware boot rather than a user action and the saved state is
        restored. Use this for lights whose firmware boots at 1 % (brightness ≈ 3).
        Set to 0 to disable (rely only on unavailable-state detection).
      default: 0
      selector:
        number:
          min: 0
          max: 25
          step: 1

variables:
  target_light_id: !input target_light
  grenton_switch_id: !input grenton_switch
  post_outage_behavior: !input post_outage_behavior
  recovery_brightness_threshold: !input recovery_brightness_threshold
  # Unique per automation instance; friendly_name gives a readable name in HA Scenes UI
  saved_scene_id: "light_sync_saved_{{ this.attributes.friendly_name | slugify }}"

mode: single

trigger:
  # User action from Grenton side (real state → real state, not a restart)
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Grenton restarted — its switch state is not reliable, light is source of truth
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light state changed — real state to real state
  - platform: state
    entity_id: !input target_light
    id: "light_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light recovered from unavailable (long outage — device went fully unavailable)
  - platform: state
    entity_id: !input target_light
    id: "light_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  - platform: homeassistant
    event: start
    id: "ha_start"

action:
  - choose:
      # SCENARIO A: User action from Grenton → update light
      - conditions:
          - condition: trigger
            id: "grenton_changed"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light
          # Save scene after Grenton-driven light change
          # (the resulting light_changed trigger is dropped by mode: single)
          - if:
              - condition: template
                value_template: "{{ post_outage_behavior == 'restore_previous' }}"
            then:
              - wait_template: "{{ states(target_light_id) == states(grenton_switch_id) }}"
                timeout: "00:00:03"
              - service: scene.create
                data:
                  scene_id: "{{ saved_scene_id }}"
                  snapshot_entities:
                    - "{{ target_light_id }}"

      # SCENARIO B: Light changed — either a real user action or a firmware boot after
      # a brief power cut (group entities may go off→on without passing through unavailable)
      - conditions:
          - condition: trigger
            id: "light_changed"
        sequence:
          # Zigbee group entities report state "on" first; the brightness attribute
          # arrives in a separate update ~500 ms later. Wait 1 s so that state_attr
          # reads the settled brightness rather than the stale trigger snapshot.
          - delay: "00:00:01"
          - variables:
              # Detect firmware boot: light came on from off at suspiciously low brightness
              # with no HA user context (device-reported state change, not a UI action).
              is_boot_recovery: >
                {{ post_outage_behavior == 'restore_previous' and
                   recovery_brightness_threshold | int > 0 and
                   trigger.from_state.state == 'off' and
                   trigger.to_state.state == 'on' and
                   state_attr(target_light_id, 'brightness') | int(0)
                     <= recovery_brightness_threshold | int and
                   context.user_id is none }}
          - choose:
              # Boot-recovery path: restore the saved scene, then sync Grenton
              - conditions:
                  - condition: template
                    value_template: "{{ is_boot_recovery }}"
                sequence:
                  # TS0502B (and similar) firmware queues off commands while in 1% boot state
                  # but won't execute them until a turn_on wakes the device. Send a brief
                  # turn_on first so the subsequent scene restore is accepted.
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
                    data:
                      brightness: 255
                  - delay: "00:00:02"
                  - if:
                      - condition: template
                        value_template: >
                          {{ states.scene | selectattr('entity_id', 'equalto',
                             'scene.' ~ saved_scene_id) | list | count > 0 }}
                    then:
                      - service: scene.turn_on
                        target:
                          entity_id: "scene.{{ saved_scene_id }}"
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "on"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "off"
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: !input grenton_switch
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "off"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "on"
                        sequence:
                          - service: switch.turn_off
                            target:
                              entity_id: !input grenton_switch
            # Normal user action: sync Grenton, save scene
            default:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "on"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "off"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input grenton_switch
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "off"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "on"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: !input grenton_switch
              - if:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'restore_previous' }}"
                then:
                  - service: scene.create
                    data:
                      scene_id: "{{ saved_scene_id }}"
                      snapshot_entities:
                        - "{{ target_light_id }}"

      # SCENARIO C: Grenton recovered / HA restart → sync Grenton to light (light is source of truth)
      - conditions:
          - condition: trigger
            id:
              - "grenton_recovered"
              - "ha_start"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input grenton_switch
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input grenton_switch

      # SCENARIO D: Light recovered from unavailable (long outage — entity went fully unavailable)
      - conditions:
          - condition: trigger
            id: "light_recovered"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'restore_previous' }}"
                sequence:
                  # unavailable→off→on: device is mid-boot (e.g. TS0502B starts at 1%).
                  # Hold mode:single while waiting so Scenario B's off→on trigger is blocked.
                  # Once "on" is confirmed, issue a 100% wake-up to flush any queued off commands.
                  - if:
                      - condition: template
                        value_template: "{{ trigger.to_state.state == 'off' }}"
                    then:
                      - wait_template: "{{ states(target_light_id) == 'on' }}"
                        timeout: "00:00:10"
                      - if:
                          - condition: template
                            value_template: "{{ wait.completed }}"
                        then:
                          - service: light.turn_on
                            target:
                              entity_id: !input target_light
                            data:
                              brightness: 255
                          - delay: "00:00:02"
                  # Only restore the scene if the light is currently on (either directly
                  # recovered as "on", or just woken up above). Skip if boot failed/timed out.
                  - if:
                      - condition: template
                        value_template: >
                          {{ states(target_light_id) == 'on' and
                             states.scene | selectattr('entity_id', 'equalto',
                                'scene.' ~ saved_scene_id) | list | count > 0 }}
                    then:
                      - service: scene.turn_on
                        target:
                          entity_id: "scene.{{ saved_scene_id }}"
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "on"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "off"
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: !input grenton_switch
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "off"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "on"
                        sequence:
                          - service: switch.turn_off
                            target:
                              entity_id: !input grenton_switch

              - conditions:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'turn_on' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
                  - wait_template: "{{ is_state(target_light_id, 'on') }}"
                    timeout: "00:00:03"
                  - service: switch.turn_on
                    target:
                      entity_id: !input grenton_switch

              - conditions:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'turn_off' }}"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light
                  - wait_template: "{{ is_state(target_light_id, 'off') }}"
                    timeout: "00:00:03"
                  - service: switch.turn_off
                    target:
                      entity_id: !input grenton_switch

            # light_source_of_truth (default): trust what the light reports, sync Grenton
            default:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "on"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "off"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input grenton_switch
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "off"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "on"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: !input grenton_switch
