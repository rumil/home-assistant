blueprint:
  name: Two-way synchronization Grenton - Light
  description: >
    Keeps the Grenton virtual switch in full synchronization with any light entity
    (loop and restart resistant). By default the light entity is the source of truth
    on restarts and power outages. Normal user actions from either side are synced
    bidirectionally. Optionally restores a saved snapshot (configurable attributes)
    on power-outage recovery, persisted to an input_text helper so it survives a
    Home Assistant restart. For bulbs that drop out for one on-cycle after their
    Zigbee link is re-established, the recovery path first "primes" the light and
    re-drives it until it holds, so that fragile cycle is spent automatically
    instead of ambushing the next turn-on. The same path also catches a "self-boot"
    — a bulb that powers itself up at its firmware boot level with no user or
    automation behind it — and restores the saved state instead of leaving it lit.
  domain: automation
  source_url: https://raw.githubusercontent.com/rumil/home-assistant/refs/heads/main/blueprints/switch-light-sync.yaml
  input:
    grenton_switch:
      name: Grenton Virtual Switch
      description: Choose the Grenton switch entity.
      selector:
        entity:
          domain: switch
    target_light:
      name: Target Light
      description: Choose the light entity, e.g., from a Shelly module.
      selector:
        entity:
          domain: light
    post_outage_behavior:
      name: Post-outage behavior
      description: >
        What to do when the light recovers from an unavailable state (power outage),
        or comes back on its own at its firmware boot level. "Light as source of
        truth" preserves the original backward-compatible behavior. "Restore previous
        state" additionally requires a state store helper below; without one it falls
        back to light-as-source-of-truth.
      default: light_source_of_truth
      selector:
        select:
          options:
            - label: "Light as source of truth (default)"
              value: light_source_of_truth
            - label: "Restore previous state (saved snapshot)"
              value: restore_previous
    state_store:
      name: State store (input_text helper)
      description: >
        Only relevant when "Restore previous state" is selected. A dedicated
        input_text helper (max length 255) used to persist the saved light state as
        JSON so it survives a Home Assistant restart. Create one helper per
        automation instance. Leave empty to disable persistence (no restore).
      default: ""
      selector:
        entity:
          domain: input_text
    saved_attributes:
      name: Attributes to save & restore
      description: >
        Only relevant when "Restore previous state" is selected. Which light
        attributes to snapshot and restore. Attributes the light does not currently
        expose are skipped automatically, so it is safe to list more than a given
        light supports. Add custom entries for any attribute your light reports.
      default:
        - brightness
        - color_temp_kelvin
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - brightness
            - color_temp_kelvin
            - rgb_color
            - rgbw_color
            - rgbww_color
            - hs_color
            - xy_color
            - effect
    recovery_brightness_threshold:
      name: Recovery brightness threshold (0 = disabled)
      description: >
        Only relevant when "Restore previous state" is selected. If the light comes
        back on at a brightness at or below this value (0–255 scale), it is treated
        as a firmware boot rather than a user action. Use this for lights whose
        firmware boots at 1 % (brightness ≈ 3). Set to 0 to disable boot detection
        and recovery priming entirely — the snapshot is still restored when the light
        returns from unavailable, but a self-boot can no longer be recognised.
      default: 0
      selector:
        number:
          min: 0
          max: 25
          step: 1
    prime_brightness:
      name: Recovery priming brightness
      description: >
        Only relevant when "Restore previous state" is selected and the recovery
        threshold is above 0. Before the saved snapshot is applied, the light is
        driven to this brightness and held until it stops dropping out, to
        re-establish it on the mesh. It is also the level used to wake a bulb found
        stuck at its boot level. Must stay comfortably ABOVE the recovery threshold,
        or priming cannot be told apart from a firmware boot. Defaults to full rather
        than something dim on purpose: these bulbs retain the last level they were
        commanded to and light up at it on a plain turn-on, so whatever you set here
        is also the level they will "remember" after a recovery that ends with the
        light off. This value is never written to the saved snapshot.
      default: 255
      selector:
        number:
          min: 1
          max: 255
          step: 1

variables:
  target_light_id: !input target_light
  grenton_switch_id: !input grenton_switch
  post_outage_behavior: !input post_outage_behavior
  recovery_brightness_threshold: !input recovery_brightness_threshold
  prime_brightness: !input prime_brightness
  state_store_id: !input state_store
  saved_attributes: !input saved_attributes
  # Whether a persistent state store is configured.
  has_store: "{{ state_store_id not in ['', 'unknown', 'unavailable', none] }}"
  # The saved snapshot (parsed from the store), read once at run start. Empty dict
  # when no store is configured or the store holds no valid JSON yet.
  saved: >-
    {{ states(state_store_id) | from_json(default={}) if has_store else {} }}
  # The saved attributes as a light.turn_on data dict (snapshot minus the 'state' key).
  restore_data: >-
    {% set ns = namespace(d={}) %}
    {%- for k, v in saved.items() if k != 'state' %}{% set ns.d = dict(ns.d, **{k: v}) %}{%- endfor %}
    {{ ns.d }}

mode: single
# Dropping re-entrant triggers is the intended behaviour of mode:single here, so the
# default WARNING-level "Already running" line is noise during any outage/restart burst.
# Demoted to debug rather than silenced: the burst is still a real diagnostic signal for
# a desync (see 836978b), so keep it retrievable by raising this automation's log level.
max_exceeded: debug

trigger:
  # User action from Grenton side (real state → real state, not a restart)
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Grenton restarted — its switch state is not reliable, light is source of truth
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light state changed — real state to real state
  - platform: state
    entity_id: !input target_light
    id: "light_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light recovered from unavailable (long outage — device went fully unavailable)
  - platform: state
    entity_id: !input target_light
    id: "light_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Brightness changed while the light stayed "on" (no off/unavailable transition).
  # Catches a firmware boot that drops to ~1% and reports no state-string change, so
  # none of the state triggers above would fire.
  - platform: state
    entity_id: !input target_light
    attribute: brightness
    id: "light_low"

  - platform: homeassistant
    event: start
    id: "ha_start"

action:
  - choose:
      # ─────────────────────────────────────────────────────────────────────────
      # SCENARIO A: user action from the Grenton side → drive the light to match,
      # then record the result.
      #
      # The switch is the target here, so this branch acts FIRST and settles after:
      # putting the settle up front would add a visible lag to every wall-switch
      # press. That is the only reason A does not share the light-side pipeline
      # below; the assert loop and the save guard are deliberately identical to it
      # and must be kept in lockstep.
      # ─────────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: "grenton_changed"
        sequence:
          # Single-shot, deliberately. A re-assert loop here is ACTIVELY HARMFUL and
          # was removed after one live run on 2026-07-22 (27eb974): this branch fires
          # on every Grenton change — including the one the pipeline below makes when
          # it syncs the switch — so the loop left the automation sitting in a 4 s
          # watch window after routine activity, holding the mode:single slot. A
          # turn-on issued during that window looked exactly like a spurious device
          # flip, so the loop "corrected" it by switching the light back off, while
          # mode:single swallowed the user's own light_changed triggers.
          #
          # The light-side pipeline can afford a re-assert because it knows whether
          # HA caused the change; this branch is driven by the switch and has no such
          # signal for the light. See trace 0ce61722 for the failure in full.
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light
          # Save snapshot after the Grenton-driven light change
          # (the resulting light_changed trigger is dropped by mode: single)
          - if:
              - condition: template
                value_template: "{{ post_outage_behavior == 'restore_previous' and has_store }}"
            then:
              - wait_template: "{{ states(target_light_id) == states(grenton_switch_id) }}"
                timeout: "00:00:03"
              # Wait for the brightness reading itself, not just a fixed settle — see
              # the same wait in the light-side pipeline for why 1 s is not enough on
              # a Z2M group.
              - wait_template: >-
                  {{ not is_state(target_light_id, 'on') or
                     state_attr(target_light_id, 'brightness') is not none }}
                timeout: "00:00:03"
              # Let the remaining colour attributes settle before snapshotting.
              - delay: "00:00:01"
              # Never persist a device-reported low/boot brightness, or an on-state
              # whose brightness we could not read. Unlike the light-side pipeline
              # there is no user test here: this branch reaches the light only via its
              # own bare light.turn_on, so any level the light reports is the device's
              # retained one and never a deliberate user setting. (The trigger's
              # user_id describes who flipped the *switch*, which says nothing about
              # the light's brightness.)
              - if:
                  - condition: template
                    value_template: >-
                      {{ states(target_light_id) in ['on', 'off'] and
                         not (is_state(target_light_id, 'on') and
                              (state_attr(target_light_id, 'brightness') is none or
                               state_attr(target_light_id, 'brightness') | int(0)
                                 <= recovery_brightness_threshold | int)) }}
                then:
                  - variables:
                      snapshot_json: >-
                        {% set st = states(target_light_id) %}
                        {%- set ns = namespace(d={'state': st}) %}
                        {%- if st == 'on' %}
                        {%- for a in saved_attributes %}
                        {%- set v = state_attr(target_light_id, a) %}
                        {%- if v is not none %}{% set ns.d = dict(ns.d, **{a: v}) %}{% endif %}
                        {%- endfor %}
                        {%- endif %}
                        {{ ns.d | to_json }}
                  - service: input_text.set_value
                    target:
                      # Templated (not !input) so an empty/unset store doesn't put an
                      # invalid literal entity_id in the target at config-load validation.
                      # Guarded by has_store, so it only runs with a real helper set.
                      entity_id: "{{ state_store_id }}"
                    data:
                      value: "{{ snapshot_json | trim }}"

      # ─────────────────────────────────────────────────────────────────────────
      # LIGHT-SIDE PIPELINE: every event that arrives from the light, plus HA start.
      #
      # One pipeline, one branch point. Recovery, self-boot and ordinary user actions
      # are the same physical situation seen at different moments; what differs is
      # only which way the data flows:
      #
      #   intent == 'restore'  →  write the LIGHT from the STORE
      #   intent == 'observe'  →  write the STORE from the LIGHT
      #
      # Everything after that decision — priming, asserting the target, syncing the
      # switch — is shared, so the three cases cannot drift apart in behaviour.
      #
      # Why classification happens INSIDE the branch rather than in `conditions:`:
      # the boot test needs a brightness reading, and on these Z2M groups the state
      # string arrives ~1.5 s before the brightness attribute. A condition would read
      # the value before it exists, which is exactly the trap the settle pair closes.
      # ─────────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id:
              - "light_changed"
              - "light_low"
              - "light_recovered"
              - "ha_start"
          - condition: template
            value_template: "{{ post_outage_behavior == 'restore_previous' and has_store }}"
        sequence:
          # ── Settle ───────────────────────────────────────────────────────────
          # Two different problems, two steps — do not collapse them into one.
          #
          # The delay is the settle: a Zigbee group can report an intermediate
          # brightness before its final one, so a light_low trigger that read
          # immediately could judge the boot test on a value the light is about to
          # leave. It also gives the entity time to initialise on ha_start.
          - delay: "00:00:01"
          # The wait covers late arrival: the group reports state "on" first and
          # carries the brightness in a separate later update. The settle above is not
          # long enough on its own — the gap was measured at 1.53 s on these groups.
          # Passes straight through when the light is not on (an off light
          # legitimately has no brightness).
          - wait_template: >-
              {{ not is_state(target_light_id, 'on') or
                 state_attr(target_light_id, 'brightness') is not none }}
            timeout: "00:00:03"
          - if:
              - condition: template
                value_template: "{{ states(target_light_id) in ['on', 'off'] }}"
            then:
              # ── Classify ─────────────────────────────────────────────────────
              - variables:
                  cur_on: "{{ is_state(target_light_id, 'on') }}"
                  # An absent brightness means "unknown", not "zero" — HA reports every
                  # light attribute as none while the entity is off, and for a moment
                  # after it turns on. Coercing that to 0 made it satisfy any
                  # <= threshold test, so every turn-on looked like a 1 % boot. Track
                  # "known" separately and require it.
                  cur_bri_known: "{{ state_attr(target_light_id, 'brightness') is not none }}"
                  cur_bri: "{{ state_attr(target_light_id, 'brightness') | int(0) }}"
                  # trigger.from_state / to_state do not exist on the ha_start trigger.
                  from_on: >-
                    {{ trigger.from_state is defined and trigger.from_state is not none
                       and trigger.from_state.state == 'on' }}
                  from_bri: >-
                    {{ (trigger.from_state.attributes.get('brightness', 0)
                        if (trigger.from_state is defined and trigger.from_state is not none)
                        else 0) | int(0) }}
                  # Nothing in HA caused this state — neither a user nor an automation.
                  #
                  # user_id alone is not enough: a Grenton wall-switch press reaches the
                  # light through Scenario A, whose service call leaves user_id null but
                  # DOES stamp parent_id. Requiring both to be null is what separates a
                  # device-originated report from every path HA itself can take.
                  #
                  # Do NOT use bare `context` here: HA builds an automation's own context
                  # as Context(parent_id=...) and never copies user_id into it, so
                  # `context.user_id is none` is unconditionally true and is dead code.
                  device_originated: >-
                    {{ trigger.to_state is defined and trigger.to_state is not none
                       and trigger.to_state.context.user_id is none
                       and trigger.to_state.context.parent_id is none }}
                  # On at a KNOWN brightness at or below the boot threshold.
                  at_boot_level: >-
                    {{ recovery_brightness_threshold | int > 0 and cur_on and cur_bri_known
                       and cur_bri <= recovery_brightness_threshold | int }}
                  # ...and it just DROPPED into that zone. A repeated low→low report is
                  # ignored so a device fighting back cannot create a wake loop.
                  dropped_into_boot: >-
                    {{ at_boot_level and
                       (not from_on or from_bri > recovery_brightness_threshold | int) }}
                  is_recovery: "{{ trigger.id in ['light_recovered', 'ha_start'] }}"
                  # SELF-BOOT: the bulb powered itself up. It went off → on, came up at
                  # the firmware boot level, and nothing in HA asked for it. The light
                  # never went unavailable, so none of the recovery triggers fired — but
                  # physically this is the same event, and it gets the same treatment.
                  is_self_boot: >-
                    {{ dropped_into_boot and not from_on and device_originated }}
                  intent: "{{ 'restore' if (is_recovery or is_self_boot) else 'observe' }}"
                  # A boot-level drop that is NOT a self-boot (the light was already on
                  # and sank) still deserves its brightness corrected — but only its
                  # brightness. On the observe path the light's own on/off state is the
                  # user's intent and must never be overridden; deciding on/off from a
                  # context-free device report is unsafe by construction, and doing it
                  # here once switched off lights users had just turned on.
                  needs_wake: >-
                    {{ intent == 'observe' and dropped_into_boot and device_originated }}
              # ── Target ───────────────────────────────────────────────────────
              - variables:
                  # restore → the snapshot (which MAY legitimately be 'off'; there is no
                  # user intent on this path to override). Falls back to the state the
                  # light came back in, so priming can never strand it at the priming
                  # level. observe → whatever the light itself says.
                  target_state: >-
                    {{ saved.get('state')
                       if (intent == 'restore' and saved.get('state') in ['on', 'off'])
                       else states(target_light_id) }}
                  # Attributes to send alongside an "on". Empty means a bare turn_on,
                  # which also means the assert loop below stays silent while the state
                  # already matches instead of re-commanding a light nobody touched.
                  apply_data: >-
                    {{ restore_data
                       if (intent == 'restore' and saved.get('state') == 'on')
                       else ({'brightness': prime_brightness | int} if needs_wake else {}) }}
              # ── Prime ────────────────────────────────────────────────────────
              # These bulbs are unreliable for exactly one on-cycle after their Zigbee
              # link is re-established: the first turn_on lands, and ~3 s later every
              # group member reports a spurious OFF — at FULL brightness, so this is not
              # the 1 % boot state — collapsing the group back to off. A second turn_on
              # sticks. The fragility does not expire on its own: it survives for as long
              # as the light stays off, so a recovery at 00:14 was still ambushing the
              # first turn-on at 11:26 the next morning. Spend that doomed cycle here.
              #
              # It matters even when the restore will end in 'off': these bulbs light up
              # at the last level they were COMMANDED to, so priming is what leaves them
              # with a usable remembered level for the next manual turn-on. Priming at
              # 10 % once left every fixture coming on dim.
              - if:
                  - condition: template
                    value_template: >-
                      {{ intent == 'restore' and recovery_brightness_threshold | int > 0 }}
                then:
                  - repeat:
                      sequence:
                        - service: light.turn_on
                          target:
                            entity_id: !input target_light
                          data:
                            brightness: "{{ prime_brightness | int }}"
                        # Let the command reach the device before judging the result.
                        - delay: "00:00:01"
                        # Watch for the spurious dropout: this goes true if the bulb
                        # falls back to off OR sinks into the boot zone. If it holds
                        # instead, the wait times out — so wait.completed is precisely
                        # the "it dropped" signal.
                        - wait_template: >-
                            {{ not is_state(target_light_id, 'on') or
                               (state_attr(target_light_id, 'brightness') is not none and
                                state_attr(target_light_id, 'brightness') | int(0)
                                  <= recovery_brightness_threshold | int) }}
                          timeout: "00:00:04"
                      until:
                        - condition: template
                          value_template: "{{ not wait.completed or repeat.index >= 3 }}"
              # ── Assert ───────────────────────────────────────────────────────
              # Applying the target once is not enough, and this is the subtle part.
              # Priming only proves the bulb accepts an ON — the target is a SEPARATE
              # command and just as fragile inside the same window. The group members
              # disagree: some take the turn_off while others stay on, and because Z2M
              # computes a group as on when ANY member is on, the group flips back a few
              # seconds later. Office flipped back on 3.7 s after a correct turn_off on
              # 2026-07-21.
              #
              # Staying inside the run is half the fix: it holds the mode:single slot, so
              # the spurious flip's own light_changed is dropped instead of being taken
              # for a user action, synced to the switch and written to the store.
              #
              # Entered only when there is something to assert. On an ordinary user
              # action the light is already at the target and apply_data is empty, so
              # the loop would command nothing yet still spend its full watch window
              # holding the mode:single slot — delaying the switch sync below by
              # several seconds on every single press. Skip it in that case; a state
              # HA never commanded is not one this run put at risk.
              - if:
                  - condition: template
                    value_template: >-
                      {{ intent == 'restore' or needs_wake or
                         states(target_light_id) != target_state }}
                then:
                  - repeat:
                      sequence:
                        - if:
                            - condition: template
                              value_template: >-
                                {{ states(target_light_id) != target_state or
                                   apply_data | length > 0 }}
                          then:
                            - choose:
                                - conditions:
                                    - condition: template
                                      value_template: "{{ target_state == 'on' }}"
                                  sequence:
                                    - service: light.turn_on
                                      target:
                                        entity_id: !input target_light
                                      data: "{{ apply_data }}"
                              default:
                                - service: light.turn_off
                                  target:
                                    entity_id: !input target_light
                        # Let the command land before judging whether it stuck.
                        - delay: "00:00:01"
                        # Watch for the state drifting off target. This times out —
                        # leaving wait.completed false — when it holds, so a timeout is
                        # the success signal and a completed wait means "it flipped,
                        # re-assert".
                        - wait_template: "{{ states(target_light_id) != target_state }}"
                          timeout: "00:00:04"
                      until:
                        - condition: template
                          # Stop on a FOREIGN change. Re-asserting exists to fight
                          # spurious device flips, never a deliberate command — a loop
                          # that cannot tell them apart switches off lights the user
                          # just turned on (Scenario A, 2026-07-22).
                          #
                          #   our own command  → the light carries THIS run's context id
                          #                      (HA reuses it for the device's echo too)
                          #   spurious flip    → fresh context, no user, no parent
                          #   user action      → user_id set
                          #   other automation → a parent that is not ours
                          #
                          # so only the first two are worth re-asserting against.
                          value_template: >-
                            {{ not wait.completed or repeat.index >= 3 or
                               states[target_light_id].context.user_id is not none or
                               (states[target_light_id].context.id != context.id and
                                states[target_light_id].context.parent_id is not none) }}
              # ── Sync ─────────────────────────────────────────────────────────
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "on"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "off"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input grenton_switch
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "off"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "on"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: !input grenton_switch
              # ── Save ─────────────────────────────────────────────────────────
              # ONLY on the observe path. A save on the restore path is how the store
              # gets poisoned: the priming level would become the "previous" state and
              # the next recovery would faithfully restore the light to it. A poisoned
              # store is silent and self-perpetuating — it only shows up on the NEXT
              # recovery, as the light being restored to the wrong state.
              #
              # A low reading is rejected only when nothing in HA initiated it; a user
              # who deliberately dims to 1 % gets that saved. An unknown brightness is
              # rejected too: snapshotting an on-state whose level we could not read
              # would silently drop the attribute. The level is re-read here rather than
              # reusing cur_bri because the wake above may have just corrected it, and
              # the corrected value is the one worth saving.
              - if:
                  - condition: template
                    value_template: >-
                      {{ intent == 'observe' and
                         states(target_light_id) in ['on', 'off'] and
                         not (is_state(target_light_id, 'on') and
                              (state_attr(target_light_id, 'brightness') is none or
                               (state_attr(target_light_id, 'brightness') | int(0)
                                  <= recovery_brightness_threshold | int and
                                device_originated))) }}
                then:
                  - variables:
                      snapshot_json: >-
                        {% set st = states(target_light_id) %}
                        {%- set ns = namespace(d={'state': st}) %}
                        {%- if st == 'on' %}
                        {%- for a in saved_attributes %}
                        {%- set v = state_attr(target_light_id, a) %}
                        {%- if v is not none %}{% set ns.d = dict(ns.d, **{a: v}) %}{% endif %}
                        {%- endfor %}
                        {%- endif %}
                        {{ ns.d | to_json }}
                  - service: input_text.set_value
                    target:
                      # Templated (not !input) so an empty/unset store doesn't put an
                      # invalid literal entity_id in the target at config-load validation.
                      # Guarded by has_store, so it only runs with a real helper set.
                      entity_id: "{{ state_store_id }}"
                    data:
                      value: "{{ snapshot_json | trim }}"

      # ─────────────────────────────────────────────────────────────────────────
      # CATCH-ALL: the light is the source of truth — sync the switch to it and touch
      # nothing else. Takes the Grenton switch's own recovery (handled nowhere else,
      # and relevant to every instance), plus every light recovery and HA start the
      # pipeline above did not claim: light_source_of_truth instances, and
      # restore_previous instances with no state store configured.
      #
      # MUST STAY LAST — the pipeline above takes what it needs first, and only what
      # it leaves behind should land here.
      # ─────────────────────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id:
              - "grenton_recovered"
              - "light_recovered"
              - "ha_start"
        sequence:
          # Settle, then wait for a brightness reading before reading state (see the
          # pipeline above). A no-op when the light is off or already reporting a level.
          - delay: "00:00:01"
          - wait_template: >-
              {{ not is_state(target_light_id, 'on') or
                 state_attr(target_light_id, 'brightness') is not none }}
            timeout: "00:00:03"
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input grenton_switch
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input grenton_switch
