blueprint:
  name: Two-way synchronization Grenton - Light
  description: >
    Keeps the Grenton virtual switch in full synchronization with any light entity
    (loop and restart resistant). The light entity is the source of truth on all
    restarts and power outages. Normal user actions from either side are synced
    bidirectionally.
  domain: automation
  input:
    grenton_switch:
      name: Grenton Virtual Switch
      description: Choose the Grenton switch entity.
      selector:
        entity:
          domain: switch
    target_light:
      name: Target Light
      description: Choose the light entity, e.g., from a Shelly module.
      selector:
        entity:
          domain: light

mode: single

trigger:
  # User action from Grenton side (real state → real state, not a restart)
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Grenton restarted — its switch state is not reliable, light is source of truth
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light state changed — also covers power outage recovery (from unavailable)
  - platform: state
    entity_id: !input target_light
    id: "light_changed"
    not_to:
      - unknown
      - unavailable

  - platform: homeassistant
    event: start
    id: "ha_start"

action:
  - choose:
      # SCENARIO A: User action from Grenton → update light
      - conditions:
          - condition: trigger
            id: "grenton_changed"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light

      # SCENARIO B: Light changed / Grenton recovered / HA restart → sync Grenton to light
      - conditions:
          - condition: trigger
            id:
              - "light_changed"
              - "grenton_recovered"
              - "ha_start"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input grenton_switch
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input grenton_switch
