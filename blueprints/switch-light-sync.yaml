blueprint:
  name: Two-way synchronization Grenton - Light
  description: >
    Keeps the Grenton virtual switch in full synchronization with any light entity
    (loop and restart resistant). By default the light entity is the source of truth
    on restarts and power outages. Normal user actions from either side are synced
    bidirectionally. Optionally restores a saved snapshot (configurable attributes)
    on power-outage recovery, persisted to an input_text helper so it survives a
    Home Assistant restart.
  domain: automation
  source_url: https://raw.githubusercontent.com/rumil/home-assistant/refs/heads/main/blueprints/switch-light-sync.yaml
  input:
    grenton_switch:
      name: Grenton Virtual Switch
      description: Choose the Grenton switch entity.
      selector:
        entity:
          domain: switch
    target_light:
      name: Target Light
      description: Choose the light entity, e.g., from a Shelly module.
      selector:
        entity:
          domain: light
    post_outage_behavior:
      name: Post-outage behavior
      description: >
        What to do when the light recovers from an unavailable state (power outage).
        "Light as source of truth" preserves the original backward-compatible behavior.
      default: light_source_of_truth
      selector:
        select:
          options:
            - label: "Light as source of truth (default)"
              value: light_source_of_truth
            - label: "Restore previous state (saved snapshot)"
              value: restore_previous
            - label: "Always turn on"
              value: turn_on
            - label: "Always turn off"
              value: turn_off
    state_store:
      name: State store (input_text helper)
      description: >
        Only relevant when "Restore previous state" is selected. A dedicated
        input_text helper (max length 255) used to persist the saved light state as
        JSON so it survives a Home Assistant restart. Create one helper per
        automation instance. Leave empty to disable persistence (no restore).
      default: ""
      selector:
        entity:
          domain: input_text
    saved_attributes:
      name: Attributes to save & restore
      description: >
        Only relevant when "Restore previous state" is selected. Which light
        attributes to snapshot and restore. Attributes the light does not currently
        expose are skipped automatically, so it is safe to list more than a given
        light supports. Add custom entries for any attribute your light reports.
      default:
        - brightness
        - color_temp_kelvin
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - brightness
            - color_temp_kelvin
            - rgb_color
            - rgbw_color
            - rgbww_color
            - hs_color
            - xy_color
            - effect
    recovery_brightness_threshold:
      name: Recovery brightness threshold (0 = disabled)
      description: >
        Only relevant when "Restore previous state" is selected. If the light comes
        back on at a brightness at or below this value (0–255 scale), it is treated
        as a firmware boot rather than a user action: the device is woken to 100 %
        (to flush the stuck boot state) and the saved snapshot is restored. Use this
        for lights whose firmware boots at 1 % (brightness ≈ 3). Set to 0 to disable
        (rely only on unavailable-state detection).
      default: 0
      selector:
        number:
          min: 0
          max: 25
          step: 1

variables:
  target_light_id: !input target_light
  grenton_switch_id: !input grenton_switch
  post_outage_behavior: !input post_outage_behavior
  recovery_brightness_threshold: !input recovery_brightness_threshold
  state_store_id: !input state_store
  saved_attributes: !input saved_attributes
  # Whether a persistent state store is configured.
  has_store: "{{ state_store_id not in ['', 'unknown', 'unavailable', none] }}"
  # The saved snapshot (parsed from the store), read once at run start. Empty dict
  # when no store is configured or the store holds no valid JSON yet.
  saved: >-
    {{ states(state_store_id) | from_json(default={}) if has_store else {} }}
  # The saved attributes as a light.turn_on data dict (snapshot minus the 'state' key).
  restore_data: >-
    {% set ns = namespace(d={}) %}
    {%- for k, v in saved.items() if k != 'state' %}{% set ns.d = dict(ns.d, **{k: v}) %}{%- endfor %}
    {{ ns.d }}

mode: single
# Dropping re-entrant triggers is the intended behaviour of mode:single here, so the
# default WARNING-level "Already running" line is noise during any outage/restart burst.
# Demoted to debug rather than silenced: the burst is still a real diagnostic signal for
# a desync (see 836978b), so keep it retrievable by raising this automation's log level.
max_exceeded: debug

trigger:
  # User action from Grenton side (real state → real state, not a restart)
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Grenton restarted — its switch state is not reliable, light is source of truth
  - platform: state
    entity_id: !input grenton_switch
    id: "grenton_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light state changed — real state to real state
  - platform: state
    entity_id: !input target_light
    id: "light_changed"
    not_from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Light recovered from unavailable (long outage — device went fully unavailable)
  - platform: state
    entity_id: !input target_light
    id: "light_recovered"
    from:
      - unknown
      - unavailable
    not_to:
      - unknown
      - unavailable

  # Brightness changed while the light stayed "on" (no off/unavailable transition).
  # Catches a firmware boot that drops to ~1% and reports no state-string change, so
  # none of the state triggers above would fire.
  - platform: state
    entity_id: !input target_light
    attribute: brightness
    id: "light_low"

  - platform: homeassistant
    event: start
    id: "ha_start"

action:
  - choose:
      # SCENARIO A: User action from Grenton → update light
      - conditions:
          - condition: trigger
            id: "grenton_changed"
        sequence:
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
              - conditions:
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light
          # Save snapshot after Grenton-driven light change
          # (the resulting light_changed trigger is dropped by mode: single)
          - if:
              - condition: template
                value_template: "{{ post_outage_behavior == 'restore_previous' and has_store }}"
            then:
              - wait_template: "{{ states(target_light_id) == states(grenton_switch_id) }}"
                timeout: "00:00:03"
              # Wait for the brightness reading itself, not just a fixed settle — see the
              # same wait in Scenario B for why 1 s is not enough on a Z2M group.
              - wait_template: >-
                  {{ not is_state(target_light_id, 'on') or
                     state_attr(target_light_id, 'brightness') is not none }}
                timeout: "00:00:03"
              # Let the remaining colour attributes settle before snapshotting.
              - delay: "00:00:01"
              # Never persist a device-reported low/boot brightness, or an on-state whose
              # brightness we could not read, as the saved state. Unlike Scenario B there
              # is no user test here: this branch reaches the light only via its own bare
              # light.turn_on, so any level the light reports is the device's retained one
              # and never a deliberate user setting. (The trigger's user_id describes who
              # flipped the *switch*, which says nothing about the light's brightness.)
              - if:
                  - condition: template
                    value_template: >-
                      {{ states(target_light_id) in ['on', 'off'] and
                         not (is_state(target_light_id, 'on') and
                              (state_attr(target_light_id, 'brightness') is none or
                               state_attr(target_light_id, 'brightness') | int(0)
                                 <= recovery_brightness_threshold | int)) }}
                then:
                  - variables:
                      snapshot_json: >-
                        {% set st = states(target_light_id) %}
                        {%- set ns = namespace(d={'state': st}) %}
                        {%- if st == 'on' %}
                        {%- for a in saved_attributes %}
                        {%- set v = state_attr(target_light_id, a) %}
                        {%- if v is not none %}{% set ns.d = dict(ns.d, **{a: v}) %}{% endif %}
                        {%- endfor %}
                        {%- endif %}
                        {{ ns.d | to_json }}
                  - service: input_text.set_value
                    target:
                      # Templated (not !input) so an empty/unset store doesn't put an
                      # invalid literal entity_id in the target at config-load validation.
                      # Guarded by has_store, so it only runs with a real helper set.
                      entity_id: "{{ state_store_id }}"
                    data:
                      value: "{{ snapshot_json | trim }}"

      # SCENARIO B: Light changed (on/off) OR its brightness changed while staying on.
      # Covers a real user action, a firmware boot that arrives as off→on, AND a firmware
      # boot that drops the brightness to ~1% with no off/unavailable transition (an
      # attribute-only change caught by the "light_low" brightness trigger). Both triggers
      # can fire for one on/off event; the handler recomputes from current state so the
      # outcome is identical whichever one wins under mode:single.
      - conditions:
          - condition: trigger
            id:
              - "light_changed"
              - "light_low"
        sequence:
          # Two different problems, two steps — do not collapse them into one.
          #
          # The delay is the settle: a Zigbee group can report an intermediate brightness
          # before its final one, so a light_low trigger that read immediately could judge
          # the boot heuristic on a value the light is about to leave.
          - delay: "00:00:01"
          # The wait covers late arrival: the group reports state "on" first and carries
          # the brightness in a separate later update. The settle above is not long enough
          # on its own — the gap was measured at 1.53 s on these groups, so brightness was
          # still absent when the old code sampled it at 1 s. Passes straight through when
          # the light is not on (an off light legitimately has no brightness).
          - wait_template: >-
              {{ not is_state(target_light_id, 'on') or
                 state_attr(target_light_id, 'brightness') is not none }}
            timeout: "00:00:03"
          - variables:
              cur_on: "{{ is_state(target_light_id, 'on') }}"
              # An absent brightness means "unknown", not "zero" — HA reports every light
              # attribute as none while the entity is off, and for a moment after it turns
              # on. Coercing that to 0 made it satisfy any <= threshold test, so every
              # turn-on looked like a 1 % boot. Track "known" separately and require it.
              cur_bri_known: "{{ state_attr(target_light_id, 'brightness') is not none }}"
              cur_bri: "{{ state_attr(target_light_id, 'brightness') | int(0) }}"
              from_bri: >-
                {{ (trigger.from_state.attributes.get('brightness', 0)
                    if trigger.from_state is not none else 0) | int(0) }}
              from_on: "{{ trigger.from_state is not none and trigger.from_state.state == 'on' }}"
              # Firmware boot heuristic: the light is now on at a KNOWN brightness at/below
              # the boot threshold, it just DROPPED into that low zone (a repeated low→low
              # report is ignored so the device fighting back can't create a wake/restore
              # loop), and no HA user initiated the change.
              #
              # The user test must read the triggering state's context, not `context`:
              # HA builds an automation's own context as Context(parent_id=...) and never
              # copies user_id into it, so `context.user_id` is unconditionally none here.
              # As a guard against user actions it was dead, and a deliberate turn-on took
              # this branch and got "restored" to the saved state.
              is_boot_recovery: >
                {{ post_outage_behavior == 'restore_previous' and
                   recovery_brightness_threshold | int > 0 and
                   cur_on and
                   cur_bri_known and
                   cur_bri <= recovery_brightness_threshold | int and
                   (not from_on or from_bri > recovery_brightness_threshold | int) and
                   trigger.to_state.context.user_id is none }}
          - choose:
              # Boot-recovery path: wake the device, restore the saved snapshot, sync Grenton
              - conditions:
                  - condition: template
                    value_template: "{{ is_boot_recovery }}"
                sequence:
                  # TS0502B (and similar) firmware queues commands while in 1% boot state
                  # but won't execute them until a turn_on wakes the device. Send a brief
                  # 100% turn_on first so the subsequent snapshot restore is accepted.
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
                    data:
                      brightness: 255
                  - delay: "00:00:02"
                  # Restore the persisted snapshot, if we have one.
                  - if:
                      - condition: template
                        value_template: "{{ has_store and saved.get('state') is not none }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ saved.get('state') == 'on' }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input target_light
                                data: "{{ restore_data }}"
                          - conditions:
                              - condition: template
                                value_template: "{{ saved.get('state') == 'off' }}"
                            sequence:
                              - service: light.turn_off
                                target:
                                  entity_id: !input target_light
                  # Let the restore settle before reading state for Grenton sync.
                  # Without this the restore's turn_on/turn_off is still in flight and
                  # the sync below reads the pre-restore state, syncing Grenton to a
                  # value the light is about to leave. The correcting light_changed
                  # trigger is then dropped by mode:single and the desync sticks.
                  - delay: "00:00:01"
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "on"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "off"
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: !input grenton_switch
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "off"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "on"
                        sequence:
                          - service: switch.turn_off
                            target:
                              entity_id: !input grenton_switch
            # Normal user action: sync Grenton, save snapshot
            default:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "on"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "off"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input grenton_switch
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "off"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "on"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: !input grenton_switch
              # Save the new state — but never persist a device-reported low/boot
              # brightness as the saved snapshot. A low reading is only rejected when no
              # user initiated it; a user who deliberately dims to 1 % gets that saved.
              # An unknown brightness is rejected too: snapshotting an on-state whose
              # level we could not read would silently drop the attribute.
              - if:
                  - condition: template
                    value_template: >-
                      {{ post_outage_behavior == 'restore_previous' and has_store and
                         states(target_light_id) in ['on', 'off'] and
                         not (cur_on and
                              (not cur_bri_known or
                               (cur_bri <= recovery_brightness_threshold | int and
                                trigger.to_state.context.user_id is none))) }}
                then:
                  - variables:
                      snapshot_json: >-
                        {% set st = states(target_light_id) %}
                        {%- set ns = namespace(d={'state': st}) %}
                        {%- if st == 'on' %}
                        {%- for a in saved_attributes %}
                        {%- set v = state_attr(target_light_id, a) %}
                        {%- if v is not none %}{% set ns.d = dict(ns.d, **{a: v}) %}{% endif %}
                        {%- endfor %}
                        {%- endif %}
                        {{ ns.d | to_json }}
                  - service: input_text.set_value
                    target:
                      # Templated (not !input) so an empty/unset store doesn't put an
                      # invalid literal entity_id in the target at config-load validation.
                      # Guarded by has_store, so it only runs with a real helper set.
                      entity_id: "{{ state_store_id }}"
                    data:
                      value: "{{ snapshot_json | trim }}"

      # SCENARIO C: Grenton recovered / HA restart → sync Grenton to light (light is source of truth)
      - conditions:
          - condition: trigger
            id:
              - "grenton_recovered"
              - "ha_start"
        sequence:
          # Wait for a brightness reading before testing it (see Scenario B). A no-op when
          # the light is off or already reporting a level.
          - wait_template: >-
              {{ not is_state(target_light_id, 'on') or
                 state_attr(target_light_id, 'brightness') is not none }}
            timeout: "00:00:03"
          # On HA restart only: if the light is already on at ≤ threshold brightness it is in
          # firmware boot state (TS0502B and similar boot at 1%). Wake it up and restore the
          # saved snapshot before syncing Grenton, so the 0%-brightness stuck state is fixed
          # automatically without requiring a manual toggle. (If the light is still
          # unavailable at startup, the later light_recovered trigger handles it instead.)
          # An unreadable brightness must not count as low — that would wake-and-restore a
          # light that is legitimately on, turning it off whenever the snapshot says off.
          - if:
              - condition: template
                value_template: >
                  {{ trigger.id == 'ha_start' and
                     post_outage_behavior == 'restore_previous' and has_store and
                     recovery_brightness_threshold | int > 0 and
                     is_state(target_light_id, 'on') and
                     state_attr(target_light_id, 'brightness') is not none and
                     state_attr(target_light_id, 'brightness') | int(0)
                       <= recovery_brightness_threshold | int }}
            then:
              - service: light.turn_on
                target:
                  entity_id: !input target_light
                data:
                  brightness: 255
              - delay: "00:00:02"
              - if:
                  - condition: template
                    value_template: "{{ saved.get('state') is not none }}"
                then:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ saved.get('state') == 'on' }}"
                        sequence:
                          - service: light.turn_on
                            target:
                              entity_id: !input target_light
                            data: "{{ restore_data }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ saved.get('state') == 'off' }}"
                        sequence:
                          - service: light.turn_off
                            target:
                              entity_id: !input target_light
              # Let the restore settle before reading state for Grenton sync
              - delay: "00:00:01"
          - choose:
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "on"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "off"
                sequence:
                  - service: switch.turn_on
                    target:
                      entity_id: !input grenton_switch
              - conditions:
                  - condition: state
                    entity_id: !input target_light
                    state: "off"
                  - condition: state
                    entity_id: !input grenton_switch
                    state: "on"
                sequence:
                  - service: switch.turn_off
                    target:
                      entity_id: !input grenton_switch

      # SCENARIO D: Light recovered from unavailable (long outage — entity went fully unavailable)
      - conditions:
          - condition: trigger
            id: "light_recovered"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'restore_previous' }}"
                sequence:
                  # Let brightness settle after recovery before reading it (parity with
                  # Scenario B), so a momentarily-missing brightness isn't misread as low.
                  - delay: "00:00:01"
                  # If it recovered as 'off' it may be mid-boot (e.g. TS0502B starts at 1%).
                  # Hold mode:single while waiting so Scenario B's off→on trigger is blocked.
                  - if:
                      - condition: template
                        value_template: "{{ trigger.to_state.state == 'off' }}"
                    then:
                      - wait_template: "{{ states(target_light_id) == 'on' }}"
                        timeout: "00:00:10"
                  # The wait above only proves the state string flipped to 'on'; the
                  # brightness arrives in a separate, later update. Wait for the reading
                  # itself before testing it (see Scenario B).
                  - wait_template: >-
                      {{ not is_state(target_light_id, 'on') or
                         state_attr(target_light_id, 'brightness') is not none }}
                    timeout: "00:00:03"
                  # Whether the device recovered directly to 'on' at 1% or was just woken
                  # above, if it is on at ≤ threshold brightness it is in the stuck firmware
                  # boot state. Send a 100% wake-up to flush queued commands so the snapshot
                  # restore below is actually accepted. An unreadable brightness is not
                  # treated as low — see Scenario C.
                  - if:
                      - condition: template
                        value_template: >
                          {{ recovery_brightness_threshold | int > 0 and
                             is_state(target_light_id, 'on') and
                             state_attr(target_light_id, 'brightness') is not none and
                             state_attr(target_light_id, 'brightness') | int(0)
                               <= recovery_brightness_threshold | int }}
                    then:
                      - service: light.turn_on
                        target:
                          entity_id: !input target_light
                        data:
                          brightness: 255
                      - delay: "00:00:02"
                  # Restore the persisted snapshot, if we have one.
                  - if:
                      - condition: template
                        value_template: "{{ has_store and saved.get('state') is not none }}"
                    then:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ saved.get('state') == 'on' }}"
                            sequence:
                              - service: light.turn_on
                                target:
                                  entity_id: !input target_light
                                data: "{{ restore_data }}"
                          - conditions:
                              - condition: template
                                value_template: "{{ saved.get('state') == 'off' }}"
                            sequence:
                              - service: light.turn_off
                                target:
                                  entity_id: !input target_light
                  - delay: "00:00:01"
                  - choose:
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "on"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "off"
                        sequence:
                          - service: switch.turn_on
                            target:
                              entity_id: !input grenton_switch
                      - conditions:
                          - condition: state
                            entity_id: !input target_light
                            state: "off"
                          - condition: state
                            entity_id: !input grenton_switch
                            state: "on"
                        sequence:
                          - service: switch.turn_off
                            target:
                              entity_id: !input grenton_switch

              - conditions:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'turn_on' }}"
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input target_light
                  - wait_template: "{{ is_state(target_light_id, 'on') }}"
                    timeout: "00:00:03"
                  - service: switch.turn_on
                    target:
                      entity_id: !input grenton_switch

              - conditions:
                  - condition: template
                    value_template: "{{ post_outage_behavior == 'turn_off' }}"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: !input target_light
                  - wait_template: "{{ is_state(target_light_id, 'off') }}"
                    timeout: "00:00:03"
                  - service: switch.turn_off
                    target:
                      entity_id: !input grenton_switch

            # light_source_of_truth (default): trust what the light reports, sync Grenton
            default:
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "on"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "off"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: !input grenton_switch
                  - conditions:
                      - condition: state
                        entity_id: !input target_light
                        state: "off"
                      - condition: state
                        entity_id: !input grenton_switch
                        state: "on"
                    sequence:
                      - service: switch.turn_off
                        target:
                          entity_id: !input grenton_switch
